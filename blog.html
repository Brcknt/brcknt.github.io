---
title: "Blog"
---

<!DOCTYPE html>
<html>

<head>
    <title>{{ page.title }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200;300;400;500;600;700;800;900&family=Jost:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Lexend:wght@100;200;300;400;500;600;700;800;900&family=Oswald:wght@200;300;400;500;600;700&family=Quicksand:wght@300;400;500;600;700&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Righteous&family=Roboto+Slab:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght,HEXP@200..700,1..100">
    
    <link rel="stylesheet" href="/assets/css/blog-page.css">
</head>

<body>
    <header>
        {{ page.title }}
    </header>
    {% include navigation.html %}
    <section class="blog-card-container">
        {% for post in site.posts %}
            {% if post.image %}
                <a href="{{ post.url }}" style="background-image: url({{post.image}});" class="blog-card-image">
                <div class="shadow-caption">
                    {{ post.title }}
                </div>
                </a>
            {% else %}
                <a href="{{ post.url }}" class="blog-card-text">
                <h2>{{ post.title }}</h2>
                {{ post.blurb }}
                </a>
            {% endif %}
        {% endfor %}
    </section>
    {% include footer.html %}
</body>

</html>
